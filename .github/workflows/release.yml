name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Check all-in-one dependencies
        run: npm run check-all-in-one-deps

      - name: Run workspace tests
        run: npm test

      - name: Run coverage
        run: npm run coverage

      - name: Build workspaces
        run: npm run build

      - name: Validate package tarballs
        run: npm run pack:all

      - name: Publish changed packages
        run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
